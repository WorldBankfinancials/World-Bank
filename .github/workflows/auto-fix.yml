name: Auto Fix Lint & Format

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  autofix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (root)
        run: npm install

      - name: Install dependencies (client)
        working-directory: client
        run: npm install

      # Run ESLint and auto-fix
      - name: Run ESLint with auto-fix
        run: npx eslint . --ext .ts,.tsx --fix

      # Run Prettier and auto-fix
      - name: Run Prettier with auto-fix
        run: npx prettier --write .

      # TypeScript strict check (root)
      - name: Run TypeScript type-check (root)
        run: npx tsc --noEmit

      # TypeScript strict check (client)
      - name: Run TypeScript type-check (client)
        working-directory: client
        run: npx tsc --noEmit

      # Commit and push back changes (only if ESLint/Prettier changed files)
      - name: Commit & Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-fix lint and format issues"
